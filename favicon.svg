<svg xmlns="http://www.w3.org/2000/svg" viewBox="14 14 72 72">
  <style>
    circle.node { fill: #94a3b8; } 
    circle.core { fill: #3b82f6; }
    line { stroke: #475569; }
    
    @media (prefers-color-scheme: dark) {
      circle.node { fill: #f8fafc; }
      circle.core { fill: #60a5fa; }
    }
  </style>

  <line x1="25" y1="50" x2="50" y2="25" stroke-width="8" stroke-linecap="round"/>
  <line x1="50" y1="25" x2="75" y2="50" stroke-width="8" stroke-linecap="round"/>
  <line x1="25" y1="50" x2="50" y2="75" stroke-width="8" stroke-linecap="round"/>
  <line x1="50" y1="75" x2="75" y2="50" stroke-width="8" stroke-linecap="round"/>
  
  <line x1="25" y1="50" x2="75" y2="50" stroke-width="8" stroke-linecap="round"/>
  <line x1="50" y1="25" x2="50" y2="75" stroke-width="8" stroke-linecap="round"/>

  <circle class="node" cx="25" cy="50" r="10" />
  <circle class="node" cx="75" cy="50" r="10" />
  <circle class="node" cx="50" cy="25" r="10" />
  <circle class="node" cx="50" cy="75" r="10" />
  
  <circle class="core" cx="50" cy="50" r="14" />
</svg>
